<!DOCTYPE html>
<html lang="en">

<head id="head">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' style='background:black'><text y='16' font-family='Trebuchet MS' font-weight='900' fill='orange'>UB</text></svg>">

  <!--<link rel="stylesheet" href="reset.css">-->
  <!--<link rel="stylesheet" href="base.css">-->
  <link rel="stylesheet" href="style.css">
  <!--<script type="module" src="app.js"></script>-->
  <script src="script.js" defer></script>

  <title>Yet to be named...</title>
</head>

<body id="body">
  <main>
    <form action="javascript:">
      <textarea name="text" readonly hidden></textarea>
      
      <div>
        <button value="edit">Edit</button>
        <button value="designate">Designate selected</button>
        <button value="export-state">Export state</button>
        <button value="export-palette">Export palette</button>
        <button value="import-state">Import state</button>
        <button value="import-palette">Import palette</button>
      </div>
      
      <pre><code></code></pre>
    </form>
  </main>

  <template title="sub-view">
    <dialog>
      <form method="dialog">
        <input type="hidden" name="id">
        <textarea name="text" readonly hidden></textarea>

        <div>
          <button value="edit">Edit</button>
          <button value="designate">Designate selected</button>
          <button value="delete">Delete</button>
        </div>

        <pre><code></code></pre>

        <p><output name="kindrole"></output></p>
        
        <div>
          <button value="cancel">Cancel</button>
        </div>

      </form>
    </dialog>
  </template>

  <template title="designate">
    <dialog>
      <form method="dialog">
        <input type="hidden" name="start">
        <input type="hidden" name="end">
        <textarea name="text" hidden></textarea>
        
        <pre><code></code></pre>

        <div>
          <label>
            <span>Kind:</span>
            <input name="kind">
            <button type="button" value="select">≡</button>
          </label>
        </div>

        <div>
          <label>
            <span>Role:</span>
            <input name="role">
            <button type="button" value="select">≡</button>
          </label>
        </div>

        <div>
          <label>
            <input type="checkbox" name="colored">
            <span>Color:</span>
            <input type="color" name="color" value="#ffffff" disabled>
            <button type="button" value="select" disabled>⊞</button>
          </label>
        </div>

        <div>
          <button value="create">Create designation</button>
          <button value="cancel">Cancel</button>
        </div>
      </form>
    </dialog>
  </template>

  <template title="edit">
    <dialog>
      <form method="dialog">
        <input type="hidden" name="id">
        <textarea name="text"></textarea>
        
        <div>
          <label>
            <span>Kind:</span>
            <input name="kind">
            <button type="button" value="select">≡</button>
          </label>
        </div>

        <div>
          <label>
            <span>Role:</span>
            <input name="role">
            <button type="button" value="select">≡</button>
          </label>
        </div>

        <div>
          <label>
            <input type="checkbox" name="colored">
            <span>Color:</span>
            <input type="color" name="color" value="#ffffff" disabled>
            <button type="button" value="select" disabled>⊞</button>
          </label>
        </div>

        <div>
          <button value="update">Update</button>
          <button value="cancel">Cancel</button>
        </div>
      </form>
    </dialog>
  </template>

  <template title="select">
    <dialog>
      <form method="dialog">
        <ul></ul>

        <div>
          <button value="cancel">Cancel</button>
        </div>
      </form>
    </dialog>
  </template>

  <template title="designation">
    <li>
      <button>
        <pre><code></code></pre>
      </button>
    </li>
  </template>

  <template title="labels">
    <dialog>
      <form method="dialog">
        <input type="hidden" name="key">
        
        <ul></ul>
        
        <div>
          <input type="text">
          <button type="button" value="add">Add</button>
        </div>

        <div>
          <button value="cancel">Cancel</button>
        </div>
      </form>
    </dialog>
  </template>
</body>

</html>
